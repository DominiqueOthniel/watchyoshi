[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Optional: schedule via Netlify Dashboard > Site > Functions > Scheduled functions
# Target: GET/POST https://YOUR_SITE.netlify.app/api/cron/auto-progress
# Header: Authorization: Bearer $CRON_SECRET
# Recommended: every 1 minute
