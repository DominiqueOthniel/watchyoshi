<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create account - CargoWatch</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="bg-background min-h-screen">
    <div class="min-h-screen flex items-center justify-center bg-dark-950 px-4 py-8 sm:py-12">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_50%_at_50%_-20%,rgba(14,165,233,0.12),transparent)]"></div>
        <div class="w-full max-w-md relative">
            <div class="text-center mb-6 sm:mb-8">
                <div class="flex items-center justify-center gap-2 mb-3 sm:mb-4">
                    <img src="/delivery-truck-logo.png" alt="CargoWatch" class="w-10 h-10 sm:w-12 sm:h-12 object-contain brightness-0 invert opacity-95">
                    <span class="text-2xl sm:text-3xl font-bold text-white tracking-tight">CargoWatch</span>
                </div>
                <h1 class="text-xl sm:text-2xl font-extrabold text-white">Create account</h1>
                <p class="text-sm sm:text-base text-dark-400 mt-1">Sign up to track shipments and use live chat support</p>
            </div>

            <div class="bg-dark-800/80 backdrop-blur-md border border-dark-600/50 rounded-2xl shadow-2xl p-6 sm:p-8">
                <form id="signup-form" class="space-y-5">
                    <div id="error-message" class="hidden bg-error-50 border border-error text-error px-4 py-3 rounded-xl text-sm"></div>
                    <div>
                        <label for="name" class="block text-sm font-medium text-dark-200 mb-2">Name</label>
                        <input type="text" id="name" name="name" class="w-full px-4 py-3 rounded-xl bg-dark-900/60 border border-dark-600 text-white placeholder-dark-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Your name" autocomplete="name">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-dark-200 mb-2">Email</label>
                        <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-xl bg-dark-900/60 border border-dark-600 text-white placeholder-dark-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="you@example.com" autocomplete="email">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-dark-200 mb-2">Password</label>
                        <input type="password" id="password" name="password" required minlength="6" class="w-full px-4 py-3 rounded-xl bg-dark-900/60 border border-dark-600 text-white placeholder-dark-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="At least 6 characters" autocomplete="new-password">
                    </div>
                    <button type="submit" id="signup-button" class="w-full py-3.5 rounded-xl font-semibold bg-primary text-white shadow-lg shadow-primary-500/30 hover:bg-primary-600 transition-all duration-300">Create account</button>
                </form>
                <p class="mt-6 text-center text-sm text-dark-400">
                    Already have an account? <a href="/pages/customer_login.html" class="text-primary hover:underline font-medium">Sign in</a>
                </p>
            </div>
            <p class="text-center mt-4 sm:mt-6">
                <a href="/pages/homepage.html" class="text-dark-400 hover:text-white transition-colors text-sm">← Back to Home</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const signupButton = document.getElementById('signup-button');

            errorDiv.classList.add('hidden');
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.classList.remove('hidden');
                return;
            }

            signupButton.disabled = true;
            signupButton.textContent = 'Creating account...';

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password, name: name || undefined })
                });
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Signup failed');

                const returnTo = new URLSearchParams(window.location.search).get('return') || '/pages/support_hub.html';
                window.location.href = returnTo;
            } catch (error) {
                errorDiv.textContent = error.message || 'Could not create account. Try again.';
                errorDiv.classList.remove('hidden');
                signupButton.disabled = false;
                signupButton.textContent = 'Create account';
            }
        });
    </script>
<script id="dhws-dataInjector" src="../../public/dhws-data-injector.js"></script>
</body>
</html>
